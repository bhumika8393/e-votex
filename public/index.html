
<!DOCTYPE html>
<html>

<head>

<title>CipherVoteX</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
}

input{
padding:10px;
width:250px;
margin:10px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#signupSection,
#forgotSection,
#otpSection,
#resetSection,
#voteSection{
display:none;
}

</style>

</head>

<body>

<h1>CipherVoteX Voting System</h1>

<!-- LOGIN -->

<div id="loginSection">

<h3>Login</h3>

<input id="loginPhone" placeholder="Phone">

<br>

<input id="loginPassword" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<br>

<button onclick="showSignup()">Create Account</button>

<br>

<button onclick="showForgot()">Forgot Password</button>

</div>

<!-- SIGNUP -->

<div id="signupSection">

<h3>Create Account</h3>

<input id="signupName" placeholder="Name">

<br>

<input id="signupPhone" placeholder="Phone">

<br>

<input id="signupPassword" type="password" placeholder="Password">

<br>

<button onclick="signup()">Sign Up</button>

<br>

<button onclick="showLogin()">Back to Login</button>

</div>

<!-- FORGOT PASSWORD -->

<div id="forgotSection">

<h3>Forgot Password</h3>

<input id="forgotPhone" placeholder="Phone">

<br>

<button onclick="sendOTP()">Send OTP</button>

</div>

<!-- OTP -->

<div id="otpSection">

<h3>Enter OTP</h3>

<input id="otpInput" placeholder="OTP">

<br>

<button onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- RESET PASSWORD -->

<div id="resetSection">

<h3>Reset Password</h3>

<input id="newPassword" type="password" placeholder="New Password">

<br>

<button onclick="resetPassword()">Reset Password</button>

</div>

<!-- VOTE -->

<div id="voteSection">

<h2>Select Candidate</h2>

<button onclick="vote('Alice')">Alice</button>

<button onclick="vote('Bob')">Bob</button>

<button onclick="vote('Charlie')">Charlie</button>

<br><br>

<button onclick="logout()">Sign Out</button>

</div>

<script src="App.js"></script>

<script>
document.getElementById("loginSection").style.display="block"
</script>

</body>
</html>
